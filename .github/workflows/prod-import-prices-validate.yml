name: Retired Pricing Entrypoints Contract

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/functions/import-prices/**"
      - "supabase/functions/import-prices-v3/**"
      - "supabase/functions/import-prices-bridge/**"
      - "supabase/*import_prices*.ps1"
      - "scripts/**/*.ps1"
      - "scripts/**/*import*prices*"
      - "scripts/ci/assert_retired_pricing_entrypoints.mjs"
      - "tests/contracts/retired_pricing_automation_v1.test.mjs"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "supabase/functions/import-prices/**"
      - "supabase/functions/import-prices-v3/**"
      - "supabase/functions/import-prices-bridge/**"
      - "supabase/*import_prices*.ps1"
      - "scripts/**/*.ps1"
      - "scripts/**/*import*prices*"
      - "scripts/ci/assert_retired_pricing_entrypoints.mjs"
      - "tests/contracts/retired_pricing_automation_v1.test.mjs"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  verify-retired-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reject database-capable legacy pricing entrypoints
        run: node scripts/ci/assert_retired_pricing_entrypoints.mjs
      - name: Verify retired pricing automation contract
        run: node --test tests/contracts/retired_pricing_automation_v1.test.mjs
