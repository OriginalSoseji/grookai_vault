name: Prod Retired Import-Prices Health

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-health-only:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify checked-in entrypoint is database-free
        run: node scripts/ci/assert_retired_pricing_entrypoints.mjs
      - name: Probe retired health branch
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_PUBLISHABLE_KEY }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) {
            throw 'Missing PROD_SUPABASE_URL'
          }
          if ([string]::IsNullOrWhiteSpace($env:SUPABASE_PUBLISHABLE_KEY)) {
            throw 'Missing PROD_PUBLISHABLE_KEY'
          }

          $url = "$($env:SUPABASE_URL.TrimEnd('/'))/functions/v1/import-prices"
          $headers = @{
            apikey = $env:SUPABASE_PUBLISHABLE_KEY
            'content-type' = 'application/json'
          }
          $body = @{ mode = 'health'; source = 'github-actions-health' } | ConvertTo-Json
          $response = Invoke-WebRequest `
            -Method POST `
            -Uri $url `
            -Headers $headers `
            -Body $body `
            -UseBasicParsing `
            -TimeoutSec 20

          if ([int]$response.StatusCode -ne 200) {
            throw "Retired health endpoint returned HTTP $($response.StatusCode)"
          }

          $json = $response.Content | ConvertFrom-Json
          if ($json.ok -ne $true -or $json.mode -ne 'health' -or $json.pipeline -ne 'retired') {
            throw "Unexpected retired health response: $($response.Content)"
          }

          Write-Host 'PASS: import-prices exposes only its retired health contract.'
