name: Founder Ops Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: write

jobs:
  collect-founder-ops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect founder ops reports
        run: npm run founder:ops:collect

      - name: Verify founder ops dashboard contract
        run: node --test tests/contracts/founder_ops_reports_v1.test.mjs

      - name: Commit updated founder ops artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audits/founder_ops_dashboard_v1
          if git diff --cached --quiet; then
            echo "No founder ops artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: update founder ops dashboard snapshots"
          git push
