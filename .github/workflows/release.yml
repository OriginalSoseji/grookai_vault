name: Release (Android)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      MOBILE_SUPABASE_URL: ${{ secrets.MOBILE_SUPABASE_URL }}
      MOBILE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.MOBILE_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Node dependencies
        run: npm ci

      - name: Validate release secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            MOBILE_SUPABASE_URL
            MOBILE_SUPABASE_PUBLISHABLE_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required for production release signing/config."
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Secret packaging guard
        run: npm run release:secret-guard

      - name: Contracts runtime preflight
        run: npm run preflight

      - name: Contracts tests
        run: npm run contracts:test

      - name: Contracts runtime health
        run: npm run contracts:runtime-health

      - name: Web typecheck
        run: npm --prefix apps/web run typecheck

      - name: Web lint
        run: npm --prefix apps/web run lint

      - name: Web production build
        run: npm run web:build:strict

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter tests
        run: flutter test --no-pub

      - name: Build signed Android app bundle
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="$MOBILE_SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$MOBILE_SUPABASE_PUBLISHABLE_KEY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
